<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Formulario</title>
</head>

<body>
  <div class="card">
    <h1>REGISTRO</h1>
    <main id="main-index">
      <form id="formulario">
        <div class="campos">
          <label>Nombre:</label>
          <input type="text" id="nombre">
        </div>
        <div class="campos">
          <label>Email:</label>
          <input type="email" id="email">
        </div>
        <div class="campos">
          <label>Edad:</label>
          <input type="number" id="edad" placeholder="Entre 18 y 60 años">
        </div>
        <div class="campos">
          <label>País:</label>
          <select id="pais">
            <option value>Seleccione...</option>
            <option value="Argentina">Argentina</option>
            <option value="Chile">Chile</option>
            <option value="Uruguay">Uruguay</option>
          </select>
        </div>
        <div class="campos">
          <label class="aceptar-terminos">
            <input type="checkbox" id="terminos"> Aceptar términos
          </label>
        </div>

        <div class="btn">
          <button type="submit">Enviar</button>
        </div>
      </form>
    </main>
  </div>
  <script src="form.js"></script>
</body>

</html>
